<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEBI — Coming Soon</title>
    <link rel="icon" type="image/png" href="NEBI-LOGO.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pixel-grid-bg"></div>

    <main class="main-container">
        <div class="logo-container">
            <img src="NEBI-LOGO.png" alt="NEBI Logo" class="logo">
        </div>

        <h1 class="heading">Pregătim ceva frumos.</h1>
        <p class="subtext">NEBI pregătește un nou teritoriu de explorat pentru pisici.</p>

        <div class="cat-area">
            <div class="cat-container" id="cat">
                <div class="speech-bubble" id="speechBubble">
                    <span id="speechText"></span>
                </div>
                <img src="PHASE 1.png" alt="NEBI Cat" class="cat-img" id="catImg">
            </div>
        </div>
    </main>

    <div class="pixel-decorations" id="decorations"></div>

    <footer class="footer">
        <span class="footer-paw">🐾</span>
        <span class="footer-text">NEBI — coming soon</span>
        <span class="footer-paw">🐾</span>
    </footer>

    <script src="script.js"></script>

</html>
